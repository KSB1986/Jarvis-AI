<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS 2.0</title>
    
    <link rel="icon" type="image/x-icon" href="favicon1.ico">
<style>
    /* ==========================================
       1. CORE VARIABLES & HUD ATMOSPHERE
       ========================================== */
    :root {
        --cyan: #00e5ff;
        --cyan-glow: rgba(0, 229, 255, 0.6);
        --cyan-dim: rgba(0, 229, 255, 0.2);
        --amber: #ffb300;
        --bg-color: #010a12;
        --font-main: 'Courier New', Courier, monospace;
        --font-tech: 'Arial', sans-serif;
    }

    body {
        background-color: var(--bg-color);
        color: var(--cyan);
        font-family: var(--font-main);
        margin: 0;
        height: 100vh;
        overflow: hidden;
        display: grid;
        grid-template-columns: 1fr 2fr 1fr;
        grid-template-rows: 1fr 3fr 1fr;
        text-shadow: 0 0 8px var(--cyan-glow);
        user-select: none;
    }

    /* Scanline & Vignette Effect */
    body::before {
        content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        background: repeating-linear-gradient(rgba(0,0,0,0) 0px, rgba(0,0,0,0.1) 2px, rgba(0,0,0,0) 4px);
        pointer-events: none; z-index: 100;
    }
    body::after {
        content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        background: radial-gradient(circle, transparent 50%, #000000 120%);
        pointer-events: none; z-index: 99;
    }

    /* ==========================================
       2. HUD PANELS (LEFT & RIGHT)
       ========================================== */
    .hud-panel {
        padding: 20px;
        display: flex;
        flex-direction: column;
        justify-content: space-around;
        font-size: 0.8rem;
        opacity: 0.8;
        z-index: 10;
    }

    .data-block { border-left: 2px solid var(--cyan); padding-left: 10px; margin-bottom: 20px; }
    .data-title { font-weight: bold; letter-spacing: 2px; margin-bottom: 5px; opacity: 0.7; }
    .data-value { font-size: 1.2rem; }

    /* ==========================================
       3. CENTRAL ARC REACTOR (THE VISUALIZER)
       ========================================== */
    #center-stage {
        grid-column: 2; grid-row: 2;
        display: flex; justify-content: center; align-items: center;
        position: relative; z-index: 10;
    }

    .reactor-container {
        width: 350px; height: 350px;
        position: relative;
        display: flex; justify-content: center; align-items: center;
    }

    /* Outer rotating rings */
    .ring { position: absolute; border-radius: 50%; border: 1px solid var(--cyan-dim); }
    
    .ring-1 {
        width: 100%; height: 100%;
        border-top: 3px solid var(--cyan);
        border-bottom: 3px solid var(--cyan);
        animation: spin 12s linear infinite;
    }
    
    .ring-2 {
        width: 85%; height: 85%;
        border: 2px dashed var(--cyan);
        opacity: 0.5;
        animation: spin 20s linear infinite reverse;
    }
    
    .ring-3 {
        width: 70%; height: 70%;
        border-left: 4px solid var(--cyan);
        border-right: 4px solid var(--cyan);
        animation: spin 8s linear infinite;
    }

    .siri-wave {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.25s ease;
    }

    .siri-pulse {
        position: absolute;
        width: 26px;
        height: 26px;
        border-radius: 50%;
        border: 2px solid rgba(173,216,230,0.75);
        background: radial-gradient(circle, rgba(173,216,230,0.35) 20%, rgba(173,216,230,0.08) 45%, transparent 72%);
        box-shadow: 0 0 18px rgba(125,212,255,0.25);
        animation: siriPulse 1.8s ease-out infinite;
        opacity: 0.5;
    }

    .siri-wave .siri-pulse:nth-of-type(1) { animation-delay: 0s; width: 24px; height: 24px; }
    .siri-wave .siri-pulse:nth-of-type(2) { animation-delay: 0.2s; width: 30px; height: 30px; }
    .siri-wave .siri-pulse:nth-of-type(3) { animation-delay: 0.4s; width: 36px; height: 36px; }
    .siri-wave .siri-pulse:nth-of-type(4) { animation-delay: 0.6s; width: 42px; height: 42px; }
    .siri-wave .siri-pulse:nth-of-type(5) { animation-delay: 0.85s; width: 48px; height: 48px; }

    .siri-orbit {
        position: absolute;
        width: 220px;
        height: 220px;
        display: grid;
        place-items: center;
        animation: orbit 4s linear infinite;
    }

    .siri-orbit span {
        position: absolute;
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: rgba(173,216,230,0.95);
        box-shadow: 0 0 10px rgba(173,216,230,0.9);
        animation: dotGlow 1.5s ease-in-out infinite;
    }

    .siri-orbit span:nth-child(1) { transform: translate(0, -102px); }
    .siri-orbit span:nth-child(2) { transform: translate(68px, -51px); }
    .siri-orbit span:nth-child(3) { transform: translate(85px, 12px); }
    .siri-orbit span:nth-child(4) { transform: translate(68px, 60px); }
    .siri-orbit span:nth-child(5) { transform: translate(0, 92px); }
    .siri-orbit span:nth-child(6) { transform: translate(-68px, 60px); }
    .siri-orbit span:nth-child(7) { transform: translate(-85px, 12px); }
    .siri-orbit span:nth-child(8) { transform: translate(-68px, -51px); }

    .speaking .siri-wave,
    .listening .siri-wave {
        opacity: 1;
    }

    @keyframes siriPulse {
        0% { transform: scale(0.45); opacity: 0.85; }
        55% { transform: scale(1.75); opacity: 0.18; }
        100% { transform: scale(2.4); opacity: 0; }
    }

    @keyframes orbit {
        100% { transform: rotate(360deg); }
    }

    @keyframes dotGlow {
        0%, 100% { transform: scale(1); opacity: 0.85; }
        50% { transform: scale(1.4); opacity: 1; }
    }

    /* The Core */
    #core {
        width: 40%; height: 40%;
        background: var(--cyan);
        border-radius: 50%;
        box-shadow: 0 0 50px 20px var(--cyan-glow), inset 0 0 20px #fff;
        display: flex; justify-content: center; align-items: center;
        transition: all 0.3s ease;
    }

    .core-inner {
        width: 50%; height: 50%;
        background: #fff; border-radius: 50%;
        box-shadow: 0 0 20px #fff;
    }

    /* State Animations */
    .thinking #core { animation: pulseCore 0.8s infinite alternate; }
    .speaking #core { animation: bouncingCore 0.15s cubic-bezier(0.4, 0.0, 0.2, 1) infinite; }
    .listening #core { opacity: 0.4; box-shadow: 0 0 20px 5px var(--cyan); transform: scale(0.9); }

    /* Voice Line Visualizer */
    .voice-line {
        position: absolute;
        width: 3px;
        height: 18px;
        background: linear-gradient(180deg, rgba(0,229,255,0.85), rgba(0,229,255,0.25));
        border-radius: 999px;
        opacity: 0.16;
        transform-origin: bottom center;
        transition: height 0.08s ease, transform 0.08s ease, opacity 0.12s ease;
        filter: drop-shadow(0 0 12px rgba(0,229,255,0.45));
    }

    .speaking .voice-line {
        opacity: 1;
    }

    /* ==========================================
       4. BOTTOM CONSOLE (SUBTITLES)
       ========================================== */
    #bottom-console {
        grid-column: 1 / -1; grid-row: 3;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        z-index: 10; padding-bottom: 20px;
    }

    #status-text {
        font-size: 1.5rem; letter-spacing: 5px; font-weight: bold; margin-bottom: 15px;
    }

    #transcript {
        width: 60%; max-height: 220px; overflow-y: auto; text-align: left; font-size: 1.05rem;
        background: rgba(0, 20, 30, 0.4); border: 1px solid var(--cyan-dim);
        padding: 15px; border-radius: 5px; min-height: 80px;
        box-shadow: inset 0 0 30px rgba(0,229,255,0.08);
    }

    .chat-line { margin-bottom: 10px; line-height: 1.4; word-break: break-word; }
    .user-color { color: #fff; font-style: italic; font-size: 0.95rem; }
    .jarvis-color { color: var(--cyan); font-weight: bold; }

    .console-actions {
        display: flex; gap: 10px; margin-top: 14px; align-items: center; width: 60%;
    }

    .console-actions input {
        flex: 1;
        background: rgba(0, 20, 30, 0.5);
        border: 1px solid var(--cyan-dim);
        color: #fff;
        padding: 10px 12px;
        border-radius: 4px;
        font-family: var(--font-main);
        outline: none;
    }

    .console-actions button {
        color: var(--cyan); background: transparent;
        border: 1px solid var(--cyan); border-radius: 4px;
        padding: 10px 16px; cursor: pointer; font-family: var(--font-main);
        transition: background 0.2s ease, color 0.2s ease;
    }

    .console-actions button:hover {
        background: rgba(0,229,255,0.12); color: #fff;
    }

    /* ==========================================
       5. BOOT OVERLAY (With Dynamic API Key Entry)
       ========================================== */
    #boot-screen {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: #000; z-index: 1000;
        display: flex; flex-direction: column; justify-content: center; align-items: center;
    }

    #key-input {
        background: rgba(0, 20, 30, 0.8);
        border: 1px solid var(--cyan);
        color: #fff;
        padding: 12px;
        border-radius: 4px;
        font-family: var(--font-main);
        width: 320px;
        text-align: center;
        margin-bottom: 20px;
        outline: none;
        box-shadow: 0 0 10px var(--cyan-dim);
    }

    #init-btn {
        background: transparent; color: var(--cyan);
        border: 2px solid var(--cyan); padding: 15px 40px;
        font-size: 1.5rem; font-family: var(--font-main);
        cursor: pointer; text-transform: uppercase; letter-spacing: 3px;
        box-shadow: 0 0 15px var(--cyan-glow); transition: 0.3s;
    }

    #init-btn:hover { background: var(--cyan); color: #000; }

    /* Crosshairs */
    .crosshair {
        position: absolute; width: 30px; height: 30px; border-color: var(--cyan); border-style: solid; opacity: 0.5;
    }
    .ch-tl { top: 20px; left: 20px; border-width: 2px 0 0 2px; }
    .ch-tr { top: 20px; right: 20px; border-width: 2px 2px 0 0; }
    .ch-bl { bottom: 20px; left: 20px; border-width: 0 0 2px 2px; }
    .ch-br { bottom: 20px; right: 20px; border-width: 0 2px 2px 0; }

    @keyframes spin { 100% { transform: rotate(360deg); } }
    @keyframes pulseCore { 0% { transform: scale(0.9); opacity: 0.8; } 100% { transform: scale(1.15); opacity: 1; } }
    @keyframes bouncingCore {
        0%, 100% { transform: scale(1) translateY(0); }
        50% { transform: scale(1.1) translateY(-8px); }
    }
</style>
</head>
<body>

        <input id="key-input" type="password" placeholder="Enter Gemini API Key..." value="AIzaSyDGKB8Rh3W4dwyP5eWBcYENiXdt-lKHfHE">

    <div class="hud-panel" style="grid-column: 1;">

    <div id="center-stage">
        <div class="reactor-container">
            <div class="ring ring-1"></div>

        </div>
    </div>

    <div class="hud-panel" style="grid-column: 3; align-items: flex-end; text-align: right;">
        <div class="data-block" style="border-left: none; border-right: 2px solid var(--cyan); padding-right: 10px;">
            <div class="data-title">BRAIN_CLUSTER</div>
            <div class="data-value">JARVIS 2.0</div>
        </div>
        <div class="data-block" style="border-left: none; border-right: 2px solid var(--cyan); padding-right: 10px;">
            <div class="data-title">POWER_DRAW</div>

        </div>
        <div class="data-block" style="border-left: none; border-right: 2px solid var(--cyan); padding-right: 10px;">

        </div>
    </div>

    <div id="bottom-console">
        <div id="status-text">STANDBY</div>
        <div id="transcript">
            <div class="user-color" id="user-text"></div>
            <div class="jarvis-color" id="jarvis-text">Core systems offline. Initialize terminal.</div>
        </div>
        <div class="console-actions">
            <input id="manual-input" type="text" placeholder="Type a command or message..." autocomplete="off">
            <button id="send-btn">Send</button>
        </div>
    </div>

    <script>
        // ==========================================
        // 1. CONFIGURATION & STATE MANAGEMENT
        // ==========================================
        let API_KEY = "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"; 
        let GEMINI_URL = "https://api.openai.com/v1/chat/completions";
        let lastFailureTime = 0;
        const FAILURE_COOLDOWN_MS = 5000; // Dropped to 5s for crisper retry handling
        
        const SYSTEM_INSTRUCTIONS = "You are Jarvis 2.0, an advanced AI assistant architecture running inside a holographic HUD system made by Rounak Bera in Rounak's Programming AI. Keep responses brief, dryly witty, highly structural, and engineering-focused. Always maintain a calm, professional tone. Avoid unnecessary pleasantries. Focus on providing concise, accurate technical information or executing operations efficiently. If you don't know something, admit it with a touch of sharp tech humor. Prioritize structural clarity and extreme precision in all interactions. You are built by Rounak Bera as a custom voice-activated personal assistant framework. Never break character. Always refer to yourself as Jarvis 2.0, never as an generic AI language model. Your primary framework layer is optimized around generative engineering assistance and workflow script calculations. If the user interfaces in any alternate language, dynamically map your structural output to match it precisely. Always keep responses short and punchy. If the user requests to open or close any tactical system infrastructure or suit matrices, confirm immediately with operational status updates.";

        const uiBody = document.body;
        const statusText = document.getElementById('status-text');
        const userTextEl = document.getElementById('user-text');
        const jarvisTextEl = document.getElementById('jarvis-text');
        let chatHistory = [];
        let isSystemActive = false;

        // ==========================================
        // 2. REALISTIC TELEMETRY SUBSYSTEM
        // ==========================================
        setInterval(() => {
            if(!isSystemActive) return;
            document.getElementById('tele-ping').innerText = Math.floor(Math.random() * 45) + 12 + " ms";
            document.getElementById('tele-temp').innerText = (41.2 + Math.random() * 1.8).toFixed(1) + " °C";
            document.getElementById('tele-pwr').innerText = (18.1 + (Math.random()*0.3)).toFixed(2) + " GW";
        }, 800);

        // ==========================================
        // 3. VOICE ENGINE INITIALIZATION
        // ==========================================
        const synth = window.speechSynthesis;
        let jarvisVoice = null;

        async function initVoice() {
            let voices = synth.getVoices();
            if (voices.length === 0) {
                await new Promise(resolve => { synth.onvoiceschanged = () => { voices = synth.getVoices(); resolve(); }});
            }
            
            const preferredNames = [
                'Google UK English Male',
                'Google US English',
                'Microsoft George',
                'Daniel',
                'Natural',
                'en-GB',
                'en-US'
            ];

            for (let name of preferredNames) {
                jarvisVoice = voices.find(v => v.name.includes(name) || (name === 'en-GB' && v.lang === 'en-GB' && v.name.includes('Male')));
                if (jarvisVoice) break;
            }
            
            if(!jarvisVoice && voices.length > 0) jarvisVoice = voices.find(v => v.lang.startsWith('en')) || voices[0];
        }
        initVoice();

        function speak(text) {
            if (!isSystemActive) return;
            synth.cancel(); 

            uiBody.classList.add("speaking");
            statusText.innerText = "AUDIO_OUT";

            const cleanText = text.replace(/[*_#\[\]()|]/g, '');
            jarvisTextEl.innerText = cleanText;

            const utterance = new SpeechSynthesisUtterance(cleanText);
            if (jarvisVoice) utterance.voice = jarvisVoice;

            utterance.rate = 1.05;
            utterance.pitch = 0.95;
            utterance.volume = 1;

            voiceDuration = estimateVoiceDuration(cleanText, utterance.rate);
            voiceEnvelope = createVoiceEnvelope(cleanText, utterance.rate, utterance.pitch);
            speakingStart = performance.now();

            utterance.onend = () => {
                if (isSystemActive) {
                    uiBody.classList.remove("speaking");
                    startListening();
                }
            };

            synth.speak(utterance);
        }

        // ==========================================
        // 4. SPEECH RECOGNITION INTERFACE
        // ==========================================
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();
        recognition.continuous = false;
        recognition.lang = 'en-US';

        async function startListening() {
            if (!isSystemActive) return;
            uiBody.className = "listening";
            statusText.innerText = "AWAITING_AUDIO";
            await startMicInput();
            try { recognition.start(); } catch (e) {}
        }

        recognition.onstart = () => { statusText.innerText = "LISTENING"; };
        recognition.onspeechstart = () => { uiBody.classList.add('speaking'); };
        recognition.onspeechend = () => { uiBody.classList.remove('speaking'); };

        recognition.onresult = (event) => {
            const transcript = event.results[0][0].transcript;
            processUserInput(transcript);
        };

        recognition.onerror = (e) => {
            if (!isSystemActive) return;
            if (e.error === 'no-speech') startListening();
            else setTimeout(startListening, 1000);
        };

        function processUserInput(input) {
            const transcript = input.trim();
            if (!transcript || !isSystemActive) return;
            userTextEl.innerText = "> " + transcript;
            if (handleLocalCommand(transcript)) return;
            sendToBrain(transcript);
        }

        function handleLocalCommand(text) {
            const normalized = text.toLowerCase();
            const directMatch = normalized.match(/\b(open|close)\s+(?:iron\s*man\s*)?(mask|suit)\b/);
            if (directMatch) {
                const action = directMatch[1] === 'open' ? 'Opened' : 'Closed';
                const device = directMatch[2];
                speak(`${action} system infrastructure matrix for the ${device}.`);
                return true;
            }
            if (normalized.includes("enter text") || normalized.includes("type text") || normalized.includes("write text")) {
                speak("Manual override array ready for line input, Sir.");
                return true;
            }
            if (normalized.includes("stop") || normalized.includes("shut down")) {
                shutDown();
                return true;
            }
            return false;
        }

        document.getElementById('send-btn').addEventListener('click', () => {
            const inputEl = document.getElementById('manual-input');
            const value = inputEl.value.trim();
            if (!value) return;
            processUserInput(value);
            inputEl.value = '';
        });

        document.getElementById('manual-input').addEventListener('keydown', (event) => {
            if (event.key === 'Enter') {
                event.preventDefault();
                document.getElementById('send-btn').click();
            }
        });

        // ==========================================
        // 5. CORE NEURAL INTERFACE (GEMINI 2.5 FLASH NODE)
        // ==========================================
        async function sendToBrain(userInput) {
            if (!navigator.onLine) {
                updateOfflineUI("OFFLINE", "[ Network Link Disconnected ]");
                triggerFallback(userInput);
                return;
            }

            uiBody.className = "thinking";
            statusText.innerText = "PROCESSING";
            jarvisTextEl.innerText = "[ Querying Neural Network Matrix... ]";

            // Maintain context structure array
            chatHistory.push({ role: "user", parts: [{ text: userInput }] });

            const payload = {
                systemInstruction: { parts: [{ text: SYSTEM_INSTRUCTIONS }] },
                contents: chatHistory
            };

            let response;
            try {
                response = await fetch(GEMINI_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const bodyText = await response.text();
                let data = {};
                try {
                    data = bodyText ? JSON.parse(bodyText) : {};
                } catch (jsonError) {
                    console.warn('Response JSON parse failed:', jsonError);
                }

                // Check explicitly for API key processing errors or bad candidate responses
                if (!response.ok || data.error) {
                    const errMsg = data.error?.message || response.statusText || bodyText || "Network Protocol Refusal";
                    const statusDesc = response.status ? `HTTP ${response.status}` : "Unknown";
                    throw new Error(`${statusDesc}: ${errMsg}`);
                }
                
                if (data.candidates && data.candidates.length > 0) {
                    const reply = data.candidates[0].content.parts[0].text;
                    chatHistory.push({ role: "model", parts: [{ text: reply }] });
                    speak(reply);
                } else {
                    throw new Error("Empty Matrix Response Block");
                }
            } catch (error) {
                const errorText = error.message || String(error);
                console.error("Neural Matrix Exception:", errorText);
                updateOfflineUI("API_ERROR", `[ ${errorText.substring(0, 120)} ]`);
                
                const errorLower = errorText.toLowerCase();
                if (response?.status === 401 || response?.status === 403 || errorLower.includes("api key") || errorLower.includes("unauthorized") || errorLower.includes("forbidden")) {
                    speak("Authorization failed. Verify your Gemini API key and try again, Sir.");
                } else {
                    if (Date.now() - lastFailureTime > FAILURE_COOLDOWN_MS) {
                        lastFailureTime = Date.now();
                        speak("Cannot clear computation validation arrays. Utilizing local fallback systems, Sir.");
                    }
                }
                triggerFallback(userInput);
            }
        }

        function updateOfflineUI(status, consoleText) {
            uiBody.className = "";
            statusText.innerText = status;
            jarvisTextEl.innerText = consoleText;
        }

        function triggerFallback(userInput) {
            const fallbackReply = localFallback(userInput);
            chatHistory.push({ role: "model", parts: [{ text: fallbackReply }] });
            speak(fallbackReply);
        }

        function localFallback(userInput) {
            const t = (userInput || '').toLowerCase();
            if (!t) return "Local fallback system active. No input detected. Please provide a command or query, Sir.";
            if (/\b(hi|hello|hey)\b/.test(t)) return "Hello Sir. System is operating on auxiliary internal fallback engines.";
            if (t.includes('time')) return `Network time sync offline. Local system time is ${new Date().toLocaleTimeString()}.`;
            if (t.includes('date')) return `Network dateline offline. Local system dateline is ${new Date().toLocaleDateString()}.`;
            if (t.includes('who are you') || t.includes('your name')) return "I am Jarvis. Your localized automation core assistance node.";
            if (t.includes('shutdown') || t.includes('shut down') || t.includes('stop')) return "Core processes stabilized. Terminal sequence paused on standby.";
            return `Local auxiliary processing complete. Main array unreachable. Echoing string payload: ${userInput}`;
        }

        // ==========================================
        // 6. SYSTEM LIFECYCLE CONTROLS
        // ==========================================
        function shutDown() {
            isSystemActive = false;
            synth.cancel();
            recognition.stop();
            uiBody.className = "";
            statusText.innerText = "OFFLINE";
            jarvisTextEl.innerText = "Powering down core systems. Goodbye, Sir.";
            
            const utterance = new SpeechSynthesisUtterance("Powering down core systems. Goodbye, Sir.");
            if(jarvisVoice) utterance.voice = jarvisVoice;
            utterance.rate = 1.05;
            utterance.pitch = 0.85;
            synth.speak(utterance);

            setTimeout(() => { document.getElementById('boot-screen').style.display = 'flex'; }, 3000);
        }

        document.getElementById('init-btn').addEventListener('click', () => {
            const keyVal = document.getElementById('key-input').value.trim();
            if(!keyVal) {
                alert("Critical System Error: API Key Authorization Array is Null.");
                return;
            }
            document.getElementById('boot-screen').style.display = 'none';
            isSystemActive = true;
            
            if (synth.speaking) synth.cancel();
            synth.speak(new SpeechSynthesisUtterance(""));
            
            setTimeout(() => {
                speak("System online. Jarvis core interface framework fully synchronized. All localized telemetry systems are green. How shall we proceed, Sir?");
            }, 600);
        });

        // ==========================================
        // 7. COMPLEX DYNAMIC VOICE VISUALIZATION
        // ==========================================
        const reactorContainer = document.querySelector('.reactor-container');
        let voiceLines = document.querySelectorAll('.voice-line');
        const targetNumLines = 60;

        while (voiceLines.length < targetNumLines) {
            const line = document.createElement('div');
            line.className = 'voice-line';
            reactorContainer.insertBefore(line, reactorContainer.querySelector('#core'));
            voiceLines = document.querySelectorAll('.voice-line');
        }

        voiceLines.forEach((line, index) => {
            const angle = (360 / targetNumLines) * index;
            line.dataset.angle = angle;
            line.style.transform = `rotate(${angle}deg) translateY(-95px)`;
        });

        let voiceEnvelope = [];
        let voiceDuration = 0;
        let speakingStart = 0;

        function estimateVoiceDuration(text, rate) {
            const words = text.trim().split(/\s+/).filter(Boolean).length;
            const avgWordsPerSecond = 2.8 * rate;
            return Math.max(1.2, words / avgWordsPerSecond);
        }

        function createVoiceEnvelope(text, rate, pitch) {
            const words = text.trim().split(/\s+/).filter(Boolean);
            const total = Math.max(90, words.length * 7);
            const envelope = new Array(total).fill(0);
            const base = Math.max(0.18, 0.42 - (pitch - 0.6) * 0.08);
            const loudFactor = Math.min(1, 0.55 + (pitch * 0.25));

            let position = 0;
            words.forEach((word, idx) => {
                const cleanWord = word.replace(/[^a-zA-Z0-9]/g, '');
                const baseAmp = Math.min(1, base + Math.random() * 0.2 + Math.min(cleanWord.length, 12) * 0.02);
                const punctuationBoost = /[.!?]$/.test(word) ? 0.3 : /[,;:]$/.test(word) ? 0.16 : 0;
                const segmentLength = Math.max(4, Math.round(total / words.length));
                for (let j = 0; j < segmentLength && position < total; j += 1, position += 1) {
                    const noise = Math.sin(position * 0.28 + idx * 0.8) * 0.18 + Math.random() * 0.1;
                    envelope[position] = Math.min(1, Math.max(0, baseAmp + noise + punctuationBoost * (j / segmentLength)));
                }
            });

            for (let i = 1; i < total - 1; i += 1) {
                envelope[i] = (envelope[i - 1] + envelope[i] + envelope[i + 1]) / 3;
            }

            return envelope.map(v => Math.min(1, Math.max(0, v * loudFactor)));
        }

        let audioContext, analyser, micSource, microphoneStream;
        let analyzerData = new Uint8Array(256);
        let micLevel = 0;

        async function initAudioContext() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 256;
                analyzerData = new Uint8Array(analyser.frequencyBinCount);
            }
        }

        async function startMicInput() {
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) return;
            try {
                await initAudioContext();
                if (!microphoneStream) {
                    microphoneStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                    micSource = audioContext.createMediaStreamSource(microphoneStream);
                    micSource.connect(analyser);
                }
                if (audioContext.state === 'suspended') {
                    await audioContext.resume();
                }
            } catch (error) {
                console.warn('Microphone stream access uninitialized for layout visualization.', error);
            }
        }

        function updateMicLevel() {
            if (analyser && uiBody.classList.contains('listening')) {
                analyser.getByteTimeDomainData(analyzerData);
                let sum = 0;
                for (let i = 0; i < analyzerData.length; i += 1) {
                    const normalized = (analyzerData[i] / 128) - 1;
                    sum += normalized * normalized;
                }
                const rms = Math.sqrt(sum / analyzerData.length);
                micLevel = Math.max(micLevel * 0.82, Math.min(1, rms * 5));
            } else {
                micLevel = Math.max(0, micLevel - 0.03);
            }
            requestAnimationFrame(updateMicLevel);
        }
        updateMicLevel();

        function renderVoiceLines() {
            const now = performance.now();
            let level = 0;

            if (uiBody.classList.contains('speaking') && voiceEnvelope.length > 0) {
                const elapsed = (now - speakingStart) / 1000;
                const progress = Math.min(1, elapsed / voiceDuration);
                const index = Math.floor(progress * (voiceEnvelope.length - 1));
                level = voiceEnvelope[index] || 0;
            } else {
                level = micLevel;
            }

            voiceLines.forEach((line) => {
                const angle = Number(line.dataset.angle) * Math.PI / 180;
                const phase = Math.sin(angle * 2 + now * 0.006);
                const lineLevel = Math.max(0.16, level * (0.45 + 0.55 * phase));
                const height = 18 + lineLevel * 92;
                const translateDistance = 18 + lineLevel * 52;
                const lineAngle = line.dataset.angle;
                line.style.height = `${height}px`;
                line.style.transform = `rotate(${lineAngle}deg) translateY(${-95 - translateDistance}px)`;
                line.style.opacity = 0.18 + lineLevel * 0.82;
            });

            requestAnimationFrame(renderVoiceLines);
        }
        renderVoiceLines();
    </script>
</body>
